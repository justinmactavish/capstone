<!DOCTYPE html>

<head>

<title>IoT Data Pipeline — Team 1 Topology</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {

    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 32px 24px;
    color: #e2e8f0;
  }
  .page-header {
    text-align: center;
    margin-bottom: 36px;

    font-weight: 700;
    letter-spacing: 0.02em;
    color: #f1f5f9;
  }

    font-size: 13px;
    color: #64748b;
    margin-top: 6px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .diagram-wrap {
    background: #151920;
    border: 1px solid #1e2535;
    border-radius: 16px;
    padding: 40px 48px 48px;
    width: 100%;
    max-width: 1100px;
    position: relative;
  }
  svg {
    width: 100%;
    height: auto;
    display: block;
    overflow: visible;
  }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid #1e2535;
    justify-content: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #94a3b8;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 4px;
    flex-shrink: 0;

</head>
<body>

<div class="page-header">
  <h1>IoT Data Pipeline — System Topology</h1>
  <p>IoT Academy · Conestoga College · Team 1 · Capstone Project 2026</p>
</div>

<div class="diagram-wrap">
<svg viewBox="0 0 1020 520" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">

      <path d="M0,0 L0,6 L8,3 z" fill="#a855f7" opacity="0.9"/>
    </marker>

    <filter id="glow-red" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-blue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Node gradient fills -->
    <linearGradient id="grad-hardware" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#172d4a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad-plc" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#172d4a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad-service" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3050;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#161e38;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad-broker" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a2a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#112518;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad-db" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1e4a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e1232;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad-viz" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2e40;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#111e2a;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- ═══════════════════════════════════════════════════════
       TIER BACKGROUND BANDS (subtle)
  ══════════════════════════════════════════════════════════ -->

  <!-- Hardware tier band -->

  <text x="95" y="30" text-anchor="middle" font-size="9.5" fill="#475569" font-family="Segoe UI, sans-serif" letter-spacing="0.08em" text-transform="uppercase">HARDWARE</text>

  <!-- Integration tier band -->
  <rect x="190" y="12" width="162" height="496" rx="10" fill="#1a2030" opacity="0.5" stroke="#1e2535" stroke-width="1"/>
  <text x="271" y="30" text-anchor="middle" font-size="9.5" fill="#475569" font-family="Segoe UI, sans-serif" letter-spacing="0.08em">INTEGRATION</text>

  <!-- Messaging tier band -->
  <rect x="366" y="12" width="162" height="496" rx="10" fill="#182418" opacity="0.5" stroke="#1e2535" stroke-width="1"/>
  <text x="447" y="30" text-anchor="middle" font-size="9.5" fill="#475569" font-family="Segoe UI, sans-serif" letter-spacing="0.08em">MESSAGING</text>

  <!-- Storage + API tier band -->
  <rect x="542" y="12" width="222" height="496" rx="10" fill="#1e1a2e" opacity="0.5" stroke="#1e2535" stroke-width="1"/>
  <text x="653" y="30" text-anchor="middle" font-size="9.5" fill="#475569" font-family="Segoe UI, sans-serif" letter-spacing="0.08em">STORAGE &amp; API</text>

  <!-- Visualization tier band -->

  <text x="892" y="30" text-anchor="middle" font-size="9.5" fill="#475569" font-family="Segoe UI, sans-serif" letter-spacing="0.08em">VISUALIZATION</text>

  <!-- ═══════════════════════════════════════════════════════

  ══════════════════════════════════════════════════════════ -->

  <!-- Robots → PLC (red, EtherCAT) -->

  <line x1="147" y1="242" x2="207" y2="242" stroke="#ef4444" stroke-width="1.6" marker-end="url(#arr-red)" opacity="0.8"/>
  <line x1="147" y1="358" x2="207" y2="285" stroke="#ef4444" stroke-width="1.6" marker-end="url(#arr-red)" opacity="0.8"/>

  <!-- PLC → OPC-UA Service (blue) -->
  <line x1="352" y1="242" x2="378" y2="242" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arr-blue)" opacity="0.85"/>

  <!-- OPC-UA → MQTT Broker (blue) -->
  <line x1="529" y1="242" x2="555" y2="242" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arr-blue)" opacity="0.85"/>

  <path d="M 609 187 L 609 155 L 632 155 L 632 114" stroke="#14b8a6" stroke-width="1.8" fill="none" marker-end="url(#arr-teal)" opacity="0.85"/>

  <!-- MQTT-DB Service → PostgreSQL (teal, right) -->

  <!-- PostgreSQL → REST API (purple, right) -->

  <!-- REST API → Browser Viz (purple, going down) -->
  <path d="M 944 114 L 944 200 L 980 200 L 980 370" stroke="#a855f7" stroke-width="1.8" fill="none" marker-end="url(#arr-purple)" opacity="0.85"/>

  <!-- Protocol labels on connections -->

  <rect x="158" y="125" width="50" height="16" rx="4" fill="#1a1f2e" opacity="0.9"/>

  <!-- MQTT sub (up) label -->

  <text x="733" y="78" text-anchor="middle" font-size="9" fill="#14b8a6" font-family="Segoe UI, monospace" opacity="0.9">SQL/PG</text>

  <!-- REST label (db → api) -->
  <rect x="847" y="67" width="40" height="16" rx="4" fill="#1a1f2e" opacity="0.9"/>
  <text x="867" y="78" text-anchor="middle" font-size="9" fill="#a855f7" font-family="Segoe UI, monospace" opacity="0.9">REST</text>

  <!-- MQTT sub (down) label -->

  <text x="656" y="348" text-anchor="middle" font-size="9" fill="#14b8a6" font-family="Segoe UI, monospace" opacity="0.9">MQTT</text>
